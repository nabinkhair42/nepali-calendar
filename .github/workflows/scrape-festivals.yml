name: Scrape Festivals

# Refresh web/public/data/festivals-<year>.json from ashesh.com.np.
# Runs once daily and on demand. Commits only when the JSON actually changed,
# which then triggers Vercel to redeploy the static asset CDN.

on:
  schedule:
    # 18:15 UTC = 00:00 NPT (just past midnight Nepal time, low traffic).
    - cron: "15 18 * * *"
  workflow_dispatch:
    inputs:
      years:
        description: "Space-separated BS years to scrape (default: current BS year)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: scrape-festivals
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build year arg list
        id: years
        run: |
          if [ -n "${{ inputs.years }}" ]; then
            args=""
            for y in ${{ inputs.years }}; do
              args="$args --year $y"
            done
            echo "args=$args" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Scrape
        run: pnpm scrape ${{ steps.years.outputs.args }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd ..
          if git diff --quiet -- web/public/data; then
            echo "No festival changes to commit."
            exit 0
          fi
          git add web/public/data
          git commit -m "data: refresh festivals from ashesh.com.np

          Auto-generated by .github/workflows/scrape-festivals.yml"
          git push
